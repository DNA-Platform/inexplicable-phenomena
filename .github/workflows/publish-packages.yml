name: Publish packages

on:
  push:
    branches: [main]
    paths:
      - 'library/chemistry/src/**'
      - 'library/chemistry/package.json'
      - 'library/.public/package.json'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - run: npm install

      - name: Build chemistry
        working-directory: library/chemistry
        run: npm run build

      - name: Publish chemistry
        working-directory: library/chemistry
        run: npm publish --access restricted || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish public-library
        working-directory: library/.public
        run: npm publish --access restricted || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
